name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Install npm deps
        run: npm install
      - name: Add Android platform
        run: cordova platform add android
      - name: Install plugins
        run: |
          cordova plugin add cordova-plugin-splashscreen
          cordova plugin add admob-plus-cordova@2.0.0-alpha.19 --variable APP_ID_ANDROID="ca-app-pub-3940256099942544~3347511713"
      - name: Copy cordova.js into game folder
        run: cp platforms/android/platform_www/cordova.js www/game/cordova.js
      - name: Build APK
        run: cordova build android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CoinDriveX-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
