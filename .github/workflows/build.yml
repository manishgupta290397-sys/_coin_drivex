name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Install npm deps
        run: npm install
      - name: Add Android platform
        run: cordova platform add android
      - name: Install plugins
        run: |
          cordova plugin add cordova-plugin-splashscreen
          cordova plugin add admob-plus-cordova@2.0.0-alpha.19 --variable APP_ID_ANDROID="ca-app-pub-2765601211878225~6409661215"
      - name: Prepare android
        run: cordova prepare android
      - name: Inject AdMob App ID
        run: |
          node -e "
          const fs = require('fs');
          const path = 'platforms/android/app/src/main/AndroidManifest.xml';
          let m = fs.readFileSync(path, 'utf8');
          const tag = '<meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"ca-app-pub-2765601211878225~6409661215\"/>';
          if (!m.includes('APPLICATION_ID')) {
            m = m.replace('</application>', tag + '\n    </application>');
            fs.writeFileSync(path, m);
          }
          console.log(m.includes('APPLICATION_ID') ? 'INJECTED OK' : 'FAILED');
          "
      - name: Copy cordova files into game folder
        run: cp -r platforms/android/platform_www/. platforms/android/app/src/main/assets/www/game/
      - name: Find and run gradlew
        run: |
          find platforms -name "gradlew" 2>/dev/null
          GRADLEW=$(find platforms -name "gradlew" | head -1)
          chmod +x $GRADLEW
          GRADLEW_DIR=$(dirname $GRADLEW)
          cd $GRADLEW_DIR && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CoinDriveX-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
